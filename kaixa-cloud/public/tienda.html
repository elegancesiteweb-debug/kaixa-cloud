<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Tienda en línea</title>
<style>
  :root{ --acc:#8b5cf6; --acc2:#d946ef; --bg:#f7f6fb; --s1:#fff; --text:#1a1a2e; --text2:#6b6b80; --text3:#9c9cb0; --border:#eae8f5; --maxw:520px; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:84px}
  .hero{position:relative;color:#fff;text-align:center;background:linear-gradient(135deg,var(--acc),#6d28d9);overflow:hidden;min-height:180px;display:flex;align-items:flex-end}
  .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.6}
  .hero-fade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,.6) 100%)}
  .hero-inner{position:relative;padding:20px 18px 22px;max-width:var(--maxw);margin:0 auto;width:100%;display:flex;align-items:center;gap:14px;text-align:left}
  .hero-logo{width:64px;height:64px;border-radius:16px;background:#fff;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.25);overflow:hidden;display:none;align-items:center;justify-content:center;font-size:26px}
  .hero-logo img{width:100%;height:100%;object-fit:cover}
  .hero h1{margin:0;font-size:21px;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.25)}
  .hero p{margin:6px 0 0;font-size:12.5px;opacity:.92;line-height:1.5}
  .infobar{max-width:var(--maxw);margin:0 auto;padding:10px 18px 0;display:flex;flex-wrap:wrap;gap:10px 18px;font-size:11.5px;color:var(--text2)}
  .infobar span{display:flex;align-items:center;gap:5px}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:14px}
  .card{background:var(--s1);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
  select,input,textarea{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;background:#fff;color:var(--text);font-family:inherit}
  label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:6px}
  .field{margin-bottom:12px}
  .catbar{display:flex;gap:8px;overflow-x:auto;padding:2px 14px 12px;max-width:var(--maxw);margin:0 auto}
  .catbar::-webkit-scrollbar{display:none}
  .catchip{flex-shrink:0;padding:7px 14px;border-radius:20px;background:var(--s1);border:1.5px solid var(--border);font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;white-space:nowrap}
  .catchip.active{background:var(--acc);border-color:var(--acc);color:#fff}
  .prods{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .p{background:var(--s1);border-radius:16px;overflow:hidden;box-shadow:0 3px 12px rgba(139,92,246,.08);text-align:center;transition:transform .15s}
  .p-imgwrap{width:100%;aspect-ratio:1/1;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .p-imgwrap img{width:100%;height:100%;object-fit:cover}
  .p-imgwrap span{font-size:40px}
  .p-body{padding:10px}
  .p-nm{font-size:12.5px;font-weight:700;line-height:1.3;margin-bottom:4px;min-height:32px}
  .p-pr{font-size:15px;font-weight:900;color:var(--acc);margin-bottom:4px}
  .p-st{font-size:10px;color:var(--text3);margin-bottom:8px}
  .btn{padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-weight:800;font-size:13px;cursor:pointer;width:100%}
  .btn:disabled{background:#d8d5e8;cursor:not-allowed}
  .btn-o{background:transparent;border:1.5px solid var(--acc);color:var(--acc)}
  .seg-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-weight:700;font-size:12.5px;cursor:pointer}
  .seg-btn.active{border-color:var(--acc);color:var(--acc);background:rgba(139,92,246,.06)}
  .qty{display:flex;align-items:center;justify-content:center;gap:10px}
  .qty button{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:#fff;font-weight:900;cursor:pointer;font-size:14px}
  .cartbar{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;padding:14px 18px;display:none;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:0 -4px 20px rgba(0,0,0,.2)}
  .cartbar.show{display:flex}
  .cartbar-inner{max-width:var(--maxw);margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
  .overlay.show{display:flex}
  .sheet{background:#fff;border-radius:20px 20px 0 0;max-width:var(--maxw);width:100%;max-height:88vh;overflow-y:auto;padding:22px}
  .sheet h2{margin:0 0 14px;font-size:17px}
  .item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
  .item-row .nm{flex:1;font-size:13px;font-weight:700}
  .close{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.06);border:none;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer}
  .empty{text-align:center;padding:50px 20px;color:var(--text3)}
  .empty div{font-size:38px;margin-bottom:10px}
  .totalrow{display:flex;justify-content:space-between;font-size:16px;font-weight:900;padding:12px 0;border-top:2px solid var(--border);margin-top:6px}
  .notif{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
  .notif.show{opacity:1}

  /* ── Kits y combos ── */
  .kits-title{max-width:var(--maxw);margin:18px auto 10px;padding:0 14px;font-size:15px;font-weight:900;display:flex;align-items:center;gap:6px}
  .kits{display:flex;flex-direction:column;gap:12px}
  .kit{background:var(--s1);border-radius:16px;overflow:hidden;box-shadow:0 3px 12px rgba(139,92,246,.08);display:flex;flex-direction:column}
  .kit-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;aspect-ratio:16/9;background:var(--bg)}
  .kit-carousel::-webkit-scrollbar{display:none}
  .kit-carousel .slide{flex:0 0 100%;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .kit-carousel .slide img{width:100%;height:100%;object-fit:cover}
  .kit-carousel .slide span{font-size:44px}
  .kit-dots{display:flex;justify-content:center;gap:5px;padding:6px 0 0}
  .kit-dots span{width:5px;height:5px;border-radius:50%;background:var(--border)}
  .kit-body{padding:12px 14px 14px}
  .kit-nm{font-size:14px;font-weight:800;margin-bottom:2px}
  .kit-desc{font-size:11.5px;color:var(--text2);margin-bottom:6px}
  .kit-includes{font-size:11px;color:var(--text3);margin-bottom:8px}
  .kit-pr{font-size:16px;font-weight:900;color:var(--acc);margin-bottom:8px}

  /* ── Responsive: tablet y escritorio ── */
  @media (min-width:700px){
    :root{ --maxw:680px; }
    .hero{min-height:240px}
    .hero-inner{padding:32px 24px 30px}
    .hero-logo{width:84px;height:84px;border-radius:20px}
    .hero h1{font-size:28px}
    .hero p{font-size:14px}
    .prods{grid-template-columns:repeat(3,1fr)}
    .kits{flex-direction:row;flex-wrap:wrap}
    .kit{flex:0 0 calc(50% - 6px)}
    .sheet{border-radius:20px;max-height:80vh;margin-bottom:5vh}
    .overlay{align-items:center}
  }
  @media (min-width:1000px){
    :root{ --maxw:960px; }
    .hero{min-height:280px}
    .prods{grid-template-columns:repeat(4,1fr)}
    .kit{flex:0 0 calc(33.333% - 8px)}
  }
  @media (min-width:1300px){
    :root{ --maxw:1180px; }
    .prods{grid-template-columns:repeat(5,1fr)}
  }
</style>
</head>

<div class="cartbar" id="cartBar" onclick="abrirCarrito()">
  <div class="cartbar-inner">
    <span id="cartTxt">0 productos</span>
    <span id="cartTotal" style="font-weight:900">$0.00</span>
  </div>
</div>

<div class="overlay" id="ovVariante">
  <div class="sheet" style="position:relative">
    <button class="close" onclick="cerrar('ovVariante')">✕</button>
    <h2 id="varSheetTtl">Elige una opción</h2>
    <div id="varSheetBody"></div>
  </div>
</div>

<div class="overlay" id="ovCarrito">
  <div class="sheet" style="position:relative">
    <button class="close" onclick="cerrar('ovCarrito')">✕</button>
    <h2>🛒 Tu pedido</h2>
    <div id="carritoList"></div>
    <div class="totalrow"><span>Total</span><span id="carritoTotal">$0.00</span></div>
    <button class="btn" style="margin-top:10px" onclick="irACheckout()">Continuar</button>
  </div>
</div>

<div class="overlay" id="ovCheckout">
  <div class="sheet" style="position:relative">
    <button class="close" onclick="cerrar('ovCheckout')">✕</button>
    <h2>📋 Tus datos</h2>
    <div class="field"><label>Tu nombre *</label><input id="ckNombre" oninput="guardarCarritoAbandonado()" placeholder="Nombre completo"></div>
    <div class="field"><label>Teléfono</label><input id="ckTel" type="tel" oninput="guardarCarritoAbandonado()" placeholder="10 dígitos"></div>
    <div class="field"><label>Email (opcional)</label><input id="ckEmail" type="email" placeholder="tu@correo.com"></div>
    <div class="field" id="ckEntregaBox" style="display:none">
      <label>¿Cómo lo quieres recibir?</label>
      <div style="display:flex;gap:8px">
        <button type="button" id="btnRecoger" class="seg-btn active" onclick="setTipoEntrega('recoger')">🏪 Recoger en tienda</button>
        <button type="button" id="btnDomicilio" class="seg-btn" onclick="setTipoEntrega('domicilio')">🚚 A domicilio</button>
      </div>
    </div>
    <div id="ckDomicilioBox" style="display:none">
      <div class="field"><label>Calle *</label><input id="ckCalle" placeholder="Nombre de la calle"></div>
      <div class="field"><label>Número *</label><input id="ckNumero" placeholder="Ej: 123"></div>
      <div class="field"><label>Colonia *</label><input id="ckColonia"></div>
      <div class="field"><label>Ciudad</label><input id="ckCiudad"></div>
      <div class="field"><label>Código postal</label><input id="ckCP" inputmode="numeric" maxlength="5"></div>
      <div class="field"><label>Referencias (opcional)</label><textarea id="ckReferencias" rows="2" placeholder="Ej: casa azul, portón negro"></textarea></div>
    </div>
    <div class="field"><label>Notas (opcional)</label><textarea id="ckNotas" rows="2" placeholder="Ej: recojo después de las 5pm"></textarea></div>
    <div class="field" style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <input type="checkbox" id="ckFactura" onchange="toggleFactura()" style="width:auto">
      <label style="margin:0;text-transform:none;font-size:13px;font-weight:600;color:var(--text)">Quiero factura (CFDI)</label>
    </div>
    <div id="ckFacturaBox" style="display:none">
      <div class="field"><label>RFC *</label><input id="ckRfc" placeholder="XAXX010101000" style="text-transform:uppercase"></div>
      <div class="field"><label>Razón social *</label><input id="ckRazonSocial" placeholder="Como aparece en tu constancia fiscal"></div>
      <div class="field">
        <label>Uso de CFDI</label>
        <select id="ckUsoCfdi">
          <option value="G03">G03 — Gastos en general</option>
          <option value="G01">G01 — Adquisición de mercancías</option>
          <option value="P01">P01 — Por definir</option>
        </select>
      </div>
    </div>
    <div class="totalrow"><span id="ckTotalLbl">Total a pagar en tienda</span><span id="ckTotal">$0.00</span></div>
    <button class="btn" id="ckBtn" onclick="enviarPedido()">✅ Enviar pedido</button>

<div class="overlay" id="ovOk">
  <div class="sheet" style="text-align:center;position:relative">
    <button class="close" onclick="cerrar('ovOk')">✕</button>
    <div style="font-size:48px;margin:10px 0">✅</div>
    <h2>¡Pedido enviado!</h2>
    <p style="color:var(--text2);font-size:13px;line-height:1.6">
      Tu folio es <b id="okFolio"></b>.<br>
      <span id="okMensajeEntrega"></span>
    </p>
    <div id="okPagarBox" style="display:none;margin-bottom:12px">
      <button class="btn" style="background:#009ee3" onclick="pagarConTarjeta()">💳 Pagar ahora con tarjeta</button>
      <p style="color:var(--text3);font-size:11.5px;margin-top:8px">Opcional — también puedes pagar al recoger</p>
    </div>
    <button class="btn" style="background:var(--s1);color:var(--text);border:1.5px solid var(--border)" onclick="location.reload()">Hacer otro pedido</button>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
var slug = location.pathname.split('/').filter(Boolean).pop();
var negocio = null;
var sucursales = [];
var sucursalId = null;
var productos = [];
var kits = [];
var mostrarKits = false;
var cart = {}; // { producto_id: {producto, qty} }
var catActiva = 'Todos';

function notif(msg){
  var el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

async function init(){
  try{
    var r = await fetch('/api/tienda/' + slug + '/info');
    if (!r.ok) { document.getElementById('negNombre').textContent = 'Tienda no encontrada'; return; }
    var d = await r.json();
    negocio = d.negocio;
    sucursales = d.sucursales || [];
    mostrarKits = !!negocio.tienda_mostrar_kits;
    document.getElementById('negNombre').textContent = negocio.nombre;
    document.title = negocio.nombre + ' — Pedidos en línea';
    if (negocio.tienda_descripcion) {
      document.getElementById('negDesc').textContent = negocio.tienda_descripcion;
    }
    if (negocio.tienda_imagen_url) {
      var bg = document.getElementById('heroBg');
      bg.style.backgroundImage = 'url(' + negocio.tienda_imagen_url + ')';
      bg.style.display = 'block';
      document.getElementById('heroFade').style.display = 'block';
    }
    if (negocio.tienda_logo_url) {
      var logo = document.getElementById('heroLogo');
      logo.innerHTML = '<img src="' + negocio.tienda_logo_url + '">';
      logo.style.display = 'flex';
    }
    var infoBits = [];
    if (negocio.tienda_telefono) infoBits.push('<span>📞 ' + negocio.tienda_telefono + '</span>');
    if (negocio.tienda_direccion) infoBits.push('<span>📍 ' + negocio.tienda_direccion + '</span>');
    if (negocio.tienda_horario) infoBits.push('<span>🕒 ' + negocio.tienda_horario + '</span>');
    if (infoBits.length) {
      var infoBar = document.getElementById('infoBar');
      infoBar.innerHTML = infoBits.join('');
      infoBar.style.display = 'flex';
    }

    if (!sucursales.length) {
      document.getElementById('prodsBox').innerHTML = '<div class="empty"><div>🏪</div>Esta tienda no tiene sucursales activas todavía.</div>';
      return;
    }
    if (sucursales.length === 1) {
      sucursalId = sucursales[0].id;
      await cargarProductos();
    } else {
      var box = document.getElementById('sucCard');
      box.style.display = 'block';
      var sel = document.getElementById('sucSel');
      sel.innerHTML = '<option value="">Elige una sucursal…</option>' +
        sucursales.map(function(s){ return '<option value="'+s.id+'">'+s.nombre+'</option>'; }).join('');
      document.getElementById('prodsBox').innerHTML = '<div class="empty"><div>👆</div>Elige tu sucursal para ver el catálogo</div>';
    }
  }catch(e){
    document.getElementById('negNombre').textContent = 'Error de conexión';
  }
}

async function elegirSucursal(){
  sucursalId = document.getElementById('sucSel').value;
  cart = {};
  actualizarCartBar();
  if (sucursalId) await cargarProductos();
}

async function cargarProductos(){
  var box = document.getElementById('prodsBox');
  box.innerHTML = '<div class="empty"><div>⏳</div>Cargando catálogo…</div>';
  try{
    var r = await fetch('/api/tienda/' + slug + '/productos?sucursal_id=' + sucursalId);
    productos = r.ok ? await r.json() : [];
    catActiva = 'Todos';
    renderCategorias();
    renderProductos();
  }catch(e){
    box.innerHTML = '<div class="empty"><div>⚠️</div>No se pudo cargar el catálogo</div>';
  }
  if (mostrarKits) await cargarKits();
}

async function cargarKits(){
  try{
    var r = await fetch('/api/tienda/' + slug + '/kits?sucursal_id=' + sucursalId);
    kits = r.ok ? await r.json() : [];
  }catch(e){ kits = []; }
  var section = document.getElementById('kitsSection');
  if (!kits.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  renderKits();
}

function renderKits(){
  var box = document.getElementById('kitsBox');
  box.innerHTML = kits.map(function(k){
    var fotos = (k.items||[]).filter(function(i){ return i.imagen_url && i.imagen_url.startsWith('data:'); });
    var slides, dots = '';
    if (fotos.length) {
      slides = fotos.map(function(i){ return '<div class="slide"><img src="'+i.imagen_url+'" alt=""></div>'; }).join('');
      if (fotos.length > 1) dots = '<div class="kit-dots">' + fotos.map(function(){ return '<span></span>'; }).join('') + '</div>';
    } else {
      slides = '<div class="slide"><span>'+(k.emoji||'🎁')+'</span></div>';
    }
    var incluye = (k.items||[]).map(function(i){ return i.cantidad+'x '+i.nombre_producto; }).join(' • ');
    var key = 'kit_' + k.id;
    var enCarrito = cart[key];
    var accion = enCarrito
      ? '<div class="qty"><button onclick="cambiarQty(\''+key+'\',-1)">−</button><b>'+enCarrito.qty+'</b><button onclick="cambiarQty(\''+key+'\',1)">+</button></div>'
      : '<button class="btn" onclick="agregarKitCarrito(\''+k.id+'\')">Agregar</button>';
    return '<div class="kit">' +
      '<div class="kit-carousel">'+slides+'</div>' + dots +
      '<div class="kit-body">' +
        '<div class="kit-nm">'+(k.emoji||'🎁')+' '+k.nombre+'</div>' +
        (k.descripcion ? '<div class="kit-desc">'+k.descripcion+'</div>' : '') +
        '<div class="kit-includes">Incluye: '+incluye+'</div>' +
        '<div class="kit-pr">$'+Number(k.precio).toFixed(2)+'</div>' +
        accion +
      '</div></div>';
  }).join('');
}

function agregarKitCarrito(kitId){
  var k = kits.find(function(x){ return x.id === kitId; });
  if (!k) return;
  var key = 'kit_' + kitId;
  if (cart[key]) {
    if (cart[key].qty + 1 > k.stock) { notif('Solo hay ' + k.stock + ' disponibles'); return; }
    cart[key].qty++;
  } else {
    cart[key] = { kit: k, qty: 1, nombreMostrado: (k.emoji||'🎁') + ' ' + k.nombre, precioMostrado: Number(k.precio) };
  }
  renderKits();
  actualizarCartBar();
  if (document.getElementById('ovCarrito').classList.contains('show')) renderCarrito();
  notif('✅ ' + k.nombre + ' agregado');
}

function renderCategorias(){
  var bar = document.getElementById('catBar');
  var cats = ['Todos'];
  productos.forEach(function(p){
    var c = p.categoria_nombre || 'Otros';
    if (cats.indexOf(c) === -1) cats.push(c);
  });
  if (cats.length <= 2) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  bar.innerHTML = cats.map(function(c){
    return '<div class="catchip' + (c===catActiva?' active':'') + '" onclick="filtrarCategoria(\''+c.replace(/'/g,"\\'")+'\')">' + c + '</div>';
  }).join('');
}

function filtrarCategoria(c){
  catActiva = c;
  renderCategorias();
  renderProductos();
}

function renderProductos(){
  var box = document.getElementById('prodsBox');
  if (!productos.length) {
    box.innerHTML = '<div class="empty"><div>📦</div>Sin productos disponibles por ahora</div>';
    return;
  }
  var lista = catActiva === 'Todos' ? productos : productos.filter(function(p){ return (p.categoria_nombre||'Otros') === catActiva; });
  if (!lista.length) {
    box.innerHTML = '<div class="empty"><div>🔍</div>Nada en esta categoría</div>';
    return;
  }
  box.innerHTML = '<div class="prods">' + lista.map(function(p){
    var img = (p.imagen_url && p.imagen_url.startsWith('data:'))
      ? '<img src="'+p.imagen_url+'">' : '<span>'+(p.emoji || '📦')+'</span>';
    var tieneVar = p.tiene_variantes && p.variantes && p.variantes.length;
    var enCarrito = !tieneVar && cart[p.id];
    var enCarritoCount = tieneVar ? Object.keys(cart).filter(function(k){ return cart[k].producto && cart[k].producto.id === p.id; }).reduce(function(s,k){ return s+cart[k].qty; }, 0) : 0;
    var accion;
    if (tieneVar) {
      accion = '<button class="btn" onclick="abrirSelectorVariante(\''+p.id+'\')">' + (enCarritoCount ? enCarritoCount + ' en carrito · Agregar más' : 'Elegir opción') + '</button>';
    } else if (enCarrito) {
      accion = '<div class="qty"><button onclick="cambiarQty(\''+p.id+'\',-1)">−</button><b>'+enCarrito.qty+'</b><button onclick="cambiarQty(\''+p.id+'\',1)">+</button></div>';
    } else {
      accion = '<button class="btn" onclick="agregarCarrito(\''+p.id+'\')">Agregar</button>';
    }
    return '<div class="p">' +
      '<div class="p-imgwrap">'+img+'</div>' +
      '<div class="p-body">' +
      '<div class="p-nm">'+p.nombre+'</div>' +
      '<div class="p-pr">$'+Number(p.precio).toFixed(2)+(tieneVar?'+':'')+'</div>' +
      '<div class="p-st">Disponibles: '+p.stock+'</div>' +
      accion +
      '</div></div>';
  }).join('') + '</div>';
}

function agregarCarrito(id){
  var p = productos.find(function(x){ return x.id === id; });
  if (!p) return;
  cart[id] = { producto: p, qty: 1 };
  renderProductos();
  actualizarCartBar();
  notif('✅ ' + p.nombre + ' agregado');
}

function abrirSelectorVariante(prodId){
  var p = productos.find(function(x){ return x.id === prodId; });
  if (!p) return;
  document.getElementById('varSheetTtl').textContent = p.nombre;
  var disponibles = (p.variantes||[]).filter(function(v){ return v.stock > 0; });
  var agotados = (p.variantes||[]).filter(function(v){ return v.stock <= 0; });
  var body = document.getElementById('varSheetBody');
  if (!disponibles.length) {
    body.innerHTML = '<div class="empty"><div>⚠️</div>Todas las opciones están agotadas</div>';
  } else {
    body.innerHTML = disponibles.map(function(v){
      var etiqueta = [v.atributo1_valor, v.atributo2_valor].filter(Boolean).join(' / ') || 'Opción';
      var precio = Number(p.precio) + Number(v.precio_extra||0);
      var foto = v.imagen_url
        ? '<img src="'+v.imagen_url+'" style="width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0">'
        : '';
      return '<div class="item-row" style="cursor:pointer" onclick="agregarCarritoVariante(\''+prodId+'\',\''+v.id+'\')">' +
        foto +
        '<div class="nm">'+etiqueta+'<br><span style="color:var(--text3);font-weight:400">Stock: '+v.stock+'</span></div>' +
        '<div style="font-weight:800;min-width:60px;text-align:right">$'+precio.toFixed(2)+'</div>' +
        '</div>';
    }).join('');
    if (agotados.length) {
      body.innerHTML += '<p style="color:var(--text3);font-size:11px;margin-top:8px">Agotados: ' +
        agotados.map(function(v){ return [v.atributo1_valor,v.atributo2_valor].filter(Boolean).join(' / '); }).join(', ') + '</p>';
    }
  }
  document.getElementById('ovVariante').classList.add('show');
}

function agregarCarritoVariante(prodId, varianteId){
  var p = productos.find(function(x){ return x.id === prodId; });
  if (!p) return;
  var v = (p.variantes||[]).find(function(x){ return x.id === varianteId; });
  if (!v) return;
  var key = prodId + '::' + varianteId;
  var etiqueta = [v.atributo1_valor, v.atributo2_valor].filter(Boolean).join(' / ') || 'Opción';
  if (cart[key]) {
    if (cart[key].qty + 1 > v.stock) { notif('Solo hay ' + v.stock + ' disponibles'); cerrar('ovVariante'); return; }
    cart[key].qty++;
  } else {
    cart[key] = {
      producto: p, variante: v, qty: 1,
      nombreMostrado: p.nombre + ' · ' + etiqueta,
      precioMostrado: Number(p.precio) + Number(v.precio_extra||0)
    };
  }
  cerrar('ovVariante');
  renderProductos();
  actualizarCartBar();
  if (document.getElementById('ovCarrito').classList.contains('show')) renderCarrito();
  notif('✅ ' + p.nombre + ' · ' + etiqueta + ' agregado');
}

function cambiarQty(key, delta){
  var it = cart[key];
  if (!it) return;
  var maxStock = it.variante ? it.variante.stock : (it.kit ? it.kit.stock : it.producto.stock);
  it.qty += delta;
  if (it.qty <= 0 || it.qty > maxStock) {
    if (it.qty > maxStock) { notif('Solo hay ' + maxStock + ' disponibles'); it.qty = maxStock; }
    if (it.qty <= 0) delete cart[key];
  }
  renderProductos();
  if (mostrarKits) renderKits();
  actualizarCartBar();
  if (document.getElementById('ovCarrito').classList.contains('show')) renderCarrito();
}

function totalCarrito(){
  return Object.values(cart).reduce(function(s, it){ return s + (it.precioMostrado!=null?it.precioMostrado:it.producto.precio) * it.qty; }, 0);
}
function cantidadCarrito(){
  return Object.values(cart).reduce(function(s, it){ return s + it.qty; }, 0);
}

function actualizarCartBar(){
  var n = cantidadCarrito();
  var bar = document.getElementById('cartBar');
  if (n > 0) {
    bar.classList.add('show');
    document.getElementById('cartTxt').textContent = n + (n === 1 ? ' producto' : ' productos');
    document.getElementById('cartTotal').textContent = '$' + totalCarrito().toFixed(2);
  } else {
    bar.classList.remove('show');
  }
}

function abrirCarrito(){
  renderCarrito();
  document.getElementById('ovCarrito').classList.add('show');
}
function renderCarrito(){
  var list = document.getElementById('carritoList');
  var keys = Object.keys(cart);
  if (!keys.length) {
    list.innerHTML = '<div class="empty"><div>🛒</div>Tu carrito está vacío</div>';
  } else {
    list.innerHTML = keys.map(function(key){
      var it = cart[key];
      var nombre = it.nombreMostrado || it.producto.nombre;
      var precio = it.precioMostrado!=null ? it.precioMostrado : it.producto.precio;
      var fotoUrl = (it.variante && it.variante.imagen_url) || (it.producto && it.producto.imagen_url) || (it.kit && it.kit.imagen_url);
      var foto = fotoUrl ? '<img src="'+fotoUrl+'" style="width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0">' : '';
      return '<div class="item-row">' +
        foto +
        '<div class="nm">'+nombre+'<br><span style="color:var(--text3);font-weight:400">$'+Number(precio).toFixed(2)+' c/u</span></div>' +
        '<div class="qty"><button onclick="cambiarQty(\''+key+'\',-1)">−</button><b>'+it.qty+'</b><button onclick="cambiarQty(\''+key+'\',1)">+</button></div>' +
        '<div style="font-weight:800;min-width:60px;text-align:right">$'+(precio*it.qty).toFixed(2)+'</div>' +
        '</div>';
    }).join('');
  }
  document.getElementById('carritoTotal').textContent = '$' + totalCarrito().toFixed(2);
}

function irACheckout(){
  if (!cantidadCarrito()) { notif('Agrega al menos un producto'); return; }
  cerrar('ovCarrito');
  document.getElementById('ckTotal').textContent = '$' + totalCarrito().toFixed(2);
  var entregaBox = document.getElementById('ckEntregaBox');
  if (negocio && negocio.domicilio_habilitado) {
    entregaBox.style.display = 'block';
    setTipoEntrega('recoger');
  } else {
    entregaBox.style.display = 'none';
    setTipoEntrega('recoger');
  }
  document.getElementById('ovCheckout').classList.add('show');
}

var _tipoEntrega = 'recoger';
function setTipoEntrega(tipo){
  _tipoEntrega = tipo;
  document.getElementById('btnRecoger').classList.toggle('active', tipo === 'recoger');
  document.getElementById('btnDomicilio').classList.toggle('active', tipo === 'domicilio');
  document.getElementById('ckDomicilioBox').style.display = tipo === 'domicilio' ? 'block' : 'none';
  document.getElementById('ckTotalLbl').textContent = tipo === 'domicilio' ? 'Total a pagar al recibir' : 'Total a pagar en tienda';
}

function toggleFactura(){
  var on = document.getElementById('ckFactura').checked;
  document.getElementById('ckFacturaBox').style.display = on ? 'block' : 'none';
}

var _carritoAbandonadoTimer = null;
function guardarCarritoAbandonado(){
  clearTimeout(_carritoAbandonadoTimer);
  _carritoAbandonadoTimer = setTimeout(function(){
    var tel = document.getElementById('ckTel').value.trim();
    if (!cantidadCarrito() || tel.replace(/\D/g,'').length < 10) return;
    var items = Object.values(cart).map(function(it){
      var nombre = it.nombreMostrado || (it.producto && it.producto.nombre) || (it.kit && it.kit.nombre) || '';
      var precio = it.precioMostrado != null ? it.precioMostrado : (it.producto ? it.producto.precio : (it.kit ? it.kit.precio : 0));
      return { nombre: nombre, cantidad: it.qty, precio_unitario: precio };
    });
    fetch('/api/tienda/' + slug + '/carrito-abandonado', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sucursal_id: sucursalId,
        cliente_nombre: document.getElementById('ckNombre').value.trim(),
        cliente_telefono: tel,
        cliente_email: document.getElementById('ckEmail').value.trim(),
        items: items, subtotal: totalCarrito()
      })
    }).catch(function(){});
  }, 1800);
}

var _ultimoPedidoId = null;
async function enviarPedido(){
  var nombre = document.getElementById('ckNombre').value.trim();
  if (!nombre) { notif('Escribe tu nombre'); return; }
  var quiereFactura = document.getElementById('ckFactura').checked;
  var rfc = document.getElementById('ckRfc').value.trim().toUpperCase();
  var razonSocial = document.getElementById('ckRazonSocial').value.trim();
  if (quiereFactura && (!rfc || !razonSocial)) { notif('Completa el RFC y la razón social para tu factura'); return; }
  var calle = document.getElementById('ckCalle').value.trim();
  var colonia = document.getElementById('ckColonia').value.trim();
  if (_tipoEntrega === 'domicilio' && (!calle || !colonia)) { notif('Completa la calle y colonia para la entrega a domicilio'); return; }
  var btn = document.getElementById('ckBtn');
  btn.disabled = true; btn.textContent = 'Enviando…';
  try{
    var items = Object.values(cart).map(function(it){
      return it.kit
        ? { kit_id: it.kit.id, cantidad: it.qty }
        : { producto_id: it.producto.id, cantidad: it.qty, variante_id: it.variante ? it.variante.id : null };
    });
    var r = await fetch('/api/tienda/' + slug + '/pedidos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sucursal_id: sucursalId,
        cliente_nombre: nombre,
        cliente_telefono: document.getElementById('ckTel').value.trim(),
        cliente_email: document.getElementById('ckEmail').value.trim(),
        notas: document.getElementById('ckNotas').value.trim(),
        items: items,
        requiere_factura: quiereFactura,
        rfc_receptor: rfc,
        razon_social_receptor: razonSocial,
        uso_cfdi: document.getElementById('ckUsoCfdi').value,
        tipo_entrega: _tipoEntrega,
        direccion_calle: calle,
        direccion_numero: document.getElementById('ckNumero').value.trim(),
        direccion_colonia: colonia,
        direccion_ciudad: document.getElementById('ckCiudad').value.trim(),
        direccion_cp: document.getElementById('ckCP').value.trim(),
        direccion_referencias: document.getElementById('ckReferencias').value.trim()
      })
    });
    var d = await r.json();
    if (!r.ok || !d.ok) { notif('❌ ' + (d.error || 'Error al enviar el pedido')); btn.disabled=false; btn.textContent='✅ Enviar pedido'; return; }
    cerrar('ovCheckout');
    document.getElementById('okFolio').textContent = d.folio;
    document.getElementById('okMensajeEntrega').textContent = _tipoEntrega === 'domicilio'
      ? 'La tienda revisará tu pedido y te lo llevará a domicilio a la dirección que registraste.'
      : 'La tienda revisará tu pedido y te contactará para confirmarlo. Puedes recogerlo en la tienda.';
    _ultimoPedidoId = d.id;
    document.getElementById('okPagarBox').style.display = (negocio && negocio.mp_habilitado) ? 'block' : 'none';
    document.getElementById('ovOk').classList.add('show');
    cart = {};
    actualizarCartBar();
  }catch(e){
    notif('❌ Error de conexión');
    btn.disabled = false; btn.textContent = '✅ Enviar pedido';
  }
}

async function pagarConTarjeta(){
  if (!_ultimoPedidoId) return;
  try{
    var r = await fetch('/api/tienda/' + slug + '/pagar', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pedido_id: _ultimoPedidoId })
    });
    var d = await r.json();
    if (!r.ok || !d.ok) { notif('❌ ' + (d.error || 'No se pudo iniciar el pago')); return; }
    location.href = d.init_point;
  }catch(e){ notif('❌ Error de conexión'); }
}

function cerrar(id){ document.getElementById(id).classList.remove('show'); }

init();
</script>
</body>
</html>
